<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋爱镜像 · 人格测试</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg:      #04000e;
      --rose:    #e8a0b8;
      --gold:    #d4a85e;
      --purple:  #b07ad4;
      --teal:    #7adac8;
      --text:    #f0eaff;
      --muted:   rgba(240, 234, 255, 0.5);
      --border:  rgba(180, 130, 220, 0.16);
      --border2: rgba(180, 130, 220, 0.38);
      --glass:   rgba(18, 6, 40, 0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       ANIMATED AURORA BACKGROUND
    ══════════════════════════════════════ */
    .aurora {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .aurora::before {
      content: '';
      position: absolute; inset: -20%;
      background:
        radial-gradient(ellipse 70% 55% at 25% 25%, rgba(130, 30, 200, 0.28) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 75% 75%, rgba(210, 55, 115, 0.2)  0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 60% 15%, rgba(40,  140, 200, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(100, 200, 180, 0.1)  0%, transparent 60%);
      animation: auroraFlow 18s ease-in-out infinite alternate;
    }
    .aurora::after {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    @keyframes auroraFlow {
      0%   { transform: scale(1)    rotate(0deg);   filter: hue-rotate(0deg); }
      40%  { transform: scale(1.06) rotate(3deg);   filter: hue-rotate(20deg); }
      100% { transform: scale(0.97) rotate(-2deg);  filter: hue-rotate(-15deg); }
    }

    /* ══════════════════════════════════════
       PAGE SYSTEM
    ══════════════════════════════════════ */
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; flex-direction: column; }

    /* ══════════════════════════════════════
       START PAGE
    ══════════════════════════════════════ */
    #page-start {
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      position: relative;
    }

    .start-inner {
      position: relative; z-index: 1;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    /* Mirror frame wrapper */
    .mirror-frame {
      position: relative;
      padding: 44px 36px 36px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 12px;
      border: 1px solid rgba(200, 160, 255, 0.18);
    }
    /* shimmer sweep */
    .mirror-frame::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 12px;
      background: linear-gradient(
        108deg,
        transparent 30%,
        rgba(255,255,255,0.035) 50%,
        transparent 70%
      );
      background-size: 200% 200%;
      animation: mirrorShimmer 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes mirrorShimmer {
      0%   { background-position: -100% 0; }
      100% { background-position: 200%  0; }
    }
    /* corner ornaments */
    .mirror-frame::after {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 8px;
      border: 1px solid rgba(200,160,255,0.09);
      pointer-events: none;
    }
    .corner { position: absolute; width: 18px; height: 18px; }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(200,160,255,0.45);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .c-tl { top: -1px;  left: -1px; }
    .c-tr { top: -1px;  right: -1px;  transform: scaleX(-1); }
    .c-bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
    .c-br { bottom: -1px; right: -1px; transform: scale(-1); }

    .eyemark {
      font-size: 20px;
      letter-spacing: 6px;
      color: rgba(180,130,220,0.6);
      margin-bottom: 20px;
      display: block;
    }

    .site-title {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: clamp(38px, 9vw, 62px);
      font-weight: 300;
      line-height: 1.15;
      background: linear-gradient(135deg, #f8f0ff 0%, #e8a0c8 30%, #c090e8 60%, #a8d8f0 85%, #f0e8ff 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: prism 10s ease-in-out infinite;
      margin-bottom: 8px;
    }
    @keyframes prism {
      0%   { background-position:   0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position:   0% 50%; }
    }

    .site-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,160,255,0.5), transparent);
      margin: 0 auto 26px;
    }

    .intro-text {
      font-size: 14px;
      line-height: 1.95;
      color: rgba(240, 232, 255, 0.68);
      margin-bottom: 14px;
    }

    .theory-tags {
      display: flex; flex-wrap: wrap; gap: 7px;
      justify-content: center;
      margin: 20px 0 32px;
    }
    .theory-tag {
      font-size: 11px;
      padding: 3px 11px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: rgba(200,180,240,0.55);
      letter-spacing: 0.5px;
    }

    .btn-start {
      display: inline-block;
      padding: 14px 50px;
      background: linear-gradient(135deg, rgba(170,70,130,0.35), rgba(110,45,175,0.35));
      border: 1px solid rgba(232,160,190,0.38);
      border-radius: 50px;
      color: var(--text);
      font-size: 15px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.32s ease;
      position: relative; overflow: hidden;
    }
    .btn-start::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(232,160,190,0.12), rgba(170,120,230,0.12));
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-start:hover::after { opacity: 1; }
    .btn-start:hover {
      border-color: rgba(232,160,190,0.65);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(160,70,130,0.28);
    }

    .start-meta {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 11px;
      color: rgba(200,180,240,0.38);
      letter-spacing: 1px;
    }
    .start-meta span::before { content: '· '; }

    /* author line */
    .author-line {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(200,180,240,0.28);
      letter-spacing: 3px;
      z-index: 1;
    }

    /* ══════════════════════════════════════
       QUESTION PAGE
    ══════════════════════════════════════ */
    #page-quiz { padding: 0; position: relative; }

    .quiz-header {
      position: relative; z-index: 1;
      padding: 22px 24px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .progress-bar-wrap {
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--purple), var(--teal));
      border-radius: 2px;
      transition: width 0.42s cubic-bezier(.4,0,.2,1);
    }
    .progress-num {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; min-width: 40px; text-align: right;
    }

    .quiz-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 20px 48px;
      position: relative; z-index: 1;
    }

    .question-card {
      width: 100%; max-width: 600px;
      animation: fadeUp 0.32s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-num {
      font-size: 10px; letter-spacing: 4px;
      color: var(--rose); margin-bottom: 14px; opacity: 0.75;
    }

    .question-text {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: clamp(17px, 4.2vw, 21px);
      font-weight: 400; line-height: 1.7;
      margin-bottom: 26px; color: var(--text);
    }

    .options-list { display: flex; flex-direction: column; gap: 11px; }

    .option-btn {
      width: 100%; padding: 15px 18px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: rgba(240,234,255,0.8);
      font-size: 14px; line-height: 1.65;
      text-align: left; cursor: pointer;
      transition: all 0.22s ease;
      position: relative; overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(232,160,190,0.08), rgba(170,120,230,0.08));
      opacity: 0; transition: opacity 0.22s;
    }
    .option-btn:hover::before { opacity: 1; }
    .option-btn:hover {
      border-color: rgba(200,150,240,0.4);
      color: var(--text);
      transform: translateX(5px);
    }
    .option-btn.selected {
      border-color: rgba(220,160,200,0.6);
      background: rgba(200,130,180,0.14);
      color: var(--text);
    }
    .option-inner { display: flex; align-items: flex-start; }
    .option-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 21px; height: 21px; border-radius: 50%;
      font-size: 10px; border: 1px solid var(--border2);
      margin-right: 12px; flex-shrink: 0; margin-top: 1px;
      color: rgba(180,140,220,0.8);
    }

    /* Back button */
    .quiz-nav {
      display: flex; justify-content: flex-start;
      max-width: 600px; width: 100%;
      margin-top: 20px;
    }
    .btn-back {
      background: none; border: none;
      color: var(--muted); font-size: 12px;
      letter-spacing: 2px; cursor: pointer;
      padding: 6px 0;
      display: flex; align-items: center; gap: 6px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, color 0.2s;
    }
    .btn-back.visible { opacity: 1; pointer-events: all; }
    .btn-back:hover { color: var(--text); }
    .btn-back-arrow { font-size: 14px; }

    /* ══════════════════════════════════════
       RESULT PAGE
    ══════════════════════════════════════ */
    #page-result { min-height: 100vh; padding: 0 0 64px; position: relative; }

    .result-header {
      text-align: center; padding: 44px 24px 22px;
      position: relative; z-index: 1;
    }
    .result-eyebrow {
      font-size: 10px; letter-spacing: 5px;
      color: rgba(180,140,220,0.6); margin-bottom: 12px;
    }
    .result-title {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: clamp(22px, 5.5vw, 34px);
      font-weight: 300;
      background: linear-gradient(135deg, var(--text), var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.4;
    }
    .result-sub {
      font-size: 12px; color: var(--muted);
      margin-top: 10px; letter-spacing: 1px;
    }

    .result-cards {
      max-width: 860px; margin: 0 auto;
      padding: 0 20px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 22px; position: relative; z-index: 1;
    }
    @media (max-width: 640px) { .result-cards { grid-template-columns: 1fr; } }

    .type-card {
      border-radius: 14px; padding: 26px 22px;
      position: relative; overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .type-card.light-card {
      background: linear-gradient(150deg, rgba(34,10,20,0.82), rgba(28,8,24,0.88));
      border: 1px solid rgba(212,168,94,0.22);
    }
    .type-card.dark-card {
      background: linear-gradient(150deg, rgba(8,10,26,0.85), rgba(12,8,28,0.9));
      border: 1px solid rgba(140,90,210,0.22);
    }
    /* iridescent edge glow */
    .type-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      opacity: 0.5;
    }
    .light-card::before {
      background: linear-gradient(90deg, transparent, rgba(212,168,94,0.6), rgba(232,160,190,0.4), transparent);
    }
    .dark-card::before {
      background: linear-gradient(90deg, transparent, rgba(140,90,210,0.6), rgba(100,200,220,0.3), transparent);
    }

    .card-face {
      font-size: 10px; letter-spacing: 3px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .light-card .card-face { color: rgba(212,168,94,0.8); }
    .dark-card  .card-face { color: rgba(160,120,220,0.8); }
    .card-face::after {
      content: ''; flex: 1; height: 1px;
    }
    .light-card .card-face::after { background: linear-gradient(90deg, rgba(212,168,94,0.35), transparent); }
    .dark-card  .card-face::after { background: linear-gradient(90deg, rgba(140,90,210,0.35), transparent); }

    .type-icon { font-size: 30px; margin-bottom: 10px; }
    .type-name {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: clamp(19px, 3.8vw, 24px);
      font-weight: 400; margin-bottom: 6px;
    }
    .light-card .type-name { color: #f8ddc0; }
    .dark-card  .type-name { color: #c8b4f0; }

    .type-tagline {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-style: italic;
    }
    .type-desc {
      font-size: 13.5px; line-height: 1.88;
      color: rgba(240,234,255,0.75); margin-bottom: 18px;
    }
    .insight-block {
      background: rgba(0,0,0,0.18);
      border-radius: 8px; padding: 12px 14px;
      margin-bottom: 10px; border-left: 2px solid;
    }
    .light-card .insight-block { border-color: rgba(212,168,94,0.45); }
    .dark-card  .insight-block { border-color: rgba(140,90,210,0.45); }
    .insight-label {
      font-size: 9.5px; letter-spacing: 2.5px;
      margin-bottom: 5px; text-transform: uppercase;
    }
    .light-card .insight-label { color: rgba(212,168,94,0.85); }
    .dark-card  .insight-label { color: rgba(160,120,220,0.85); }
    .insight-text {
      font-size: 12.5px; line-height: 1.78;
      color: rgba(240,234,255,0.65);
    }

    /* ══════════════════════════════════════
       RESULT ACTIONS
    ══════════════════════════════════════ */
    .result-actions {
      max-width: 860px; margin: 30px auto 0;
      padding: 0 20px;
      display: flex; gap: 12px; justify-content: center;
      position: relative; z-index: 1;
    }
    .btn-save, .btn-restart {
      padding: 12px 34px; border-radius: 50px;
      font-size: 13px; letter-spacing: 2px;
      cursor: pointer; transition: all 0.28s ease;
    }
    .btn-save {
      background: linear-gradient(135deg, rgba(212,168,94,0.22), rgba(232,160,180,0.22));
      border: 1px solid rgba(212,168,94,0.42);
      color: #f8ddc0;
    }
    .btn-save:hover {
      background: linear-gradient(135deg, rgba(212,168,94,0.38), rgba(232,160,180,0.38));
      box-shadow: 0 6px 24px rgba(212,168,94,0.18);
      transform: translateY(-2px);
    }
    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-restart:hover { border-color: var(--border2); color: var(--text); }

    /* ══════════════════════════════════════
       CAPTURE ZONE
    ══════════════════════════════════════ */
    #capture-wrap { background: #04000e; padding: 36px 20px; }
    .capture-logo { text-align: center; margin-bottom: 28px; }
    .capture-logo-title {
      font-family: 'Songti SC', 'SimSun', serif;
      font-size: 22px; font-weight: 300;
      background: linear-gradient(135deg, var(--text), var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .capture-logo-sub {
      font-size: 10px; color: var(--muted);
      letter-spacing: 4px; margin-top: 4px;
    }

    /* ══════════════════════════════════════
       SAVING OVERLAY
    ══════════════════════════════════════ */
    .saving-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(4,0,14,0.88); z-index: 9999;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .saving-overlay.active { display: flex; }
    .saving-spin {
      width: 38px; height: 38px;
      border: 2px solid var(--border);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .saving-text { font-size: 12px; color: var(--muted); letter-spacing: 3px; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(180,130,220,0.25); border-radius: 2px; }
  </style>
</head>
<body>

<div class="aurora"></div>

<!-- ════════════════════════════════
     START PAGE
════════════════════════════════ -->
<div id="page-start" class="page active">
  <div class="start-inner">
    <div class="mirror-frame">
      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div class="corner c-bl"></div>
      <div class="corner c-br"></div>

      <span class="eyemark">◎</span>
      <h1 class="site-title">恋爱镜像</h1>
      <p class="site-sub">人格测试 · 光面与暗面</p>
      <div class="divider"></div>

      <p class="intro-text">
        每个人在亲密关系中，都有一张明亮的脸，<br>
        也有一张隐藏的面孔。<br>
        30道题，映出你在爱里真实的样子——<br>
        以及那些你还未正视过的部分。
      </p>
      <p class="intro-text" style="font-size:12.5px; opacity:0.62;">
        没有好坏之分，只有真实。请凭第一感觉作答。
      </p>

      <div class="theory-tags">
        <span class="theory-tag">依恋理论</span>
        <span class="theory-tag">爱情三角理论</span>
        <span class="theory-tag">五大人格</span>
        <span class="theory-tag">戈特曼关系研究</span>
        <span class="theory-tag">爱的五种语言</span>
        <span class="theory-tag">客体关系理论</span>
      </div>

      <button class="btn-start" onclick="startQuiz()">开始测试</button>

      <div class="start-meta">
        <span>约 5 分钟</span>
        <span>共 30 题</span>
      </div>
    </div>
  </div>

  <div class="author-line">author: C</div>
</div>

<!-- ════════════════════════════════
     QUIZ PAGE
════════════════════════════════ -->
<div id="page-quiz" class="page">
  <div class="quiz-header">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="progress-num" id="progress-num">0 / 30</span>
  </div>

  <div class="quiz-body">
    <div class="question-card" id="question-card"></div>
    <div class="quiz-nav">
      <button class="btn-back" id="btn-back" onclick="goBack()">
        <span class="btn-back-arrow">←</span>
        <span>上一题</span>
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     RESULT PAGE
════════════════════════════════ -->
<div id="page-result" class="page">
  <div class="result-header">
    <div class="result-eyebrow">◎ 你的恋爱镜像</div>
    <h2 class="result-title" id="result-heading"></h2>
    <p class="result-sub">光面是你给予爱的方式，暗面是你需要正视的阴影</p>
  </div>

  <div id="capture-wrap">
    <div class="capture-logo">
      <div class="capture-logo-title">恋爱镜像</div>
      <div class="capture-logo-sub">LOVE MIRROR · PERSONALITY TEST</div>
    </div>
    <div class="result-cards" id="result-cards"></div>
  </div>

  <div class="result-actions">
    <button class="btn-save" onclick="saveImage()">保存结果为长图</button>

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let currentQ = 0;
let scores   = {};
let answers  = [];  // stores selected option index per question

const scoreKeys = ['L1','L2','L3','L4','L5','L6','L7','L8','D1','D2','D3','D4','D5','D6','D7','D8'];

function resetState() {
  scoreKeys.forEach(k => scores[k] = 0);
  answers = new Array(questions.length).fill(null);
  currentQ = 0;
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  resetState();
  showPage('page-quiz');
  renderQuestion();
}

function restartQuiz() {
  showPage('page-start');
}

// ════════════════════════════════════════════
//  QUIZ RENDERING
// ════════════════════════════════════════════
function updateProgress() {
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-num').textContent  = currentQ + ' / ' + questions.length;

  const backBtn = document.getElementById('btn-back');
  backBtn.classList.toggle('visible', currentQ > 0);
}

function renderQuestion() {
  updateProgress();

  const q       = questions[currentQ];
  const letters = ['A','B','C','D'];
  const card    = document.getElementById('question-card');

  card.innerHTML = `
    <div class="question-num">Q${String(currentQ + 1).padStart(2,'0')}</div>
    <div class="question-text">${q.text}</div>
    <div class="options-list">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})">
          <div class="option-inner">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt.text}</span>
          </div>
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(idx) {
  // If re-answering a question (came back), subtract old scores first
  if (answers[currentQ] !== null) {
    const old = questions[currentQ].options[answers[currentQ]].s;
    for (const [k, v] of Object.entries(old)) scores[k] = Math.max(0, scores[k] - v);
  }

  // Add new scores
  const s = questions[currentQ].options[idx].s;
  for (const [k, v] of Object.entries(s)) scores[k] = (scores[k] || 0) + v;
  answers[currentQ] = idx;

  // Visual flash
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  btns[idx].classList.add('selected');

  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) showResults();
    else renderQuestion();
  }, 360);
}

function goBack() {
  if (currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

// ════════════════════════════════════════════
//  RESULTS
// ════════════════════════════════════════════
function getTopType(prefix) {
  let best = null, bestVal = -1;
  for (const k of scoreKeys) {
    if (k.startsWith(prefix) && scores[k] > bestVal) { bestVal = scores[k]; best = k; }
  }
  return best;
}

function cardHTML(t, face, cls) {
  return `
    <div class="type-card ${cls}">
      <div class="card-face">${face}</div>
      <div class="type-icon">${t.icon}</div>
      <div class="type-name">${t.name}</div>
      <div class="type-tagline">${t.tagline}</div>
      <div class="type-desc">${t.desc}</div>
      <div class="insight-block">
        <div class="insight-label">✦ 给你的建议</div>
        <div class="insight-text">${t.advice}</div>
      </div>
      <div class="insight-block">
        <div class="insight-label">⚠ 容易产生纠葛</div>
        <div class="insight-text">${t.entangle}</div>
      </div>
      <div class="insight-block">
        <div class="insight-label">◈ 关系模式</div>
        <div class="insight-text">${t.pattern}</div>
      </div>
    </div>`;
}

function showResults() {
  const lt = lightTypes[getTopType('L')];
  const dt = darkTypes[getTopType('D')];

  document.getElementById('result-heading').textContent = lt.name + '  ×  ' + dt.name;
  document.getElementById('result-cards').innerHTML =
    cardHTML(lt, '光面', 'light-card') + cardHTML(dt, '暗面', 'dark-card');

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-num').textContent  = '30 / 30';
  showPage('page-result');
}

// ════════════════════════════════════════════
//  SAVE AS IMAGE
// ════════════════════════════════════════════
async function saveImage() {
  const overlay = document.getElementById('saving-overlay');
  overlay.classList.add('active');
  try {
    const target = document.getElementById('capture-wrap');
    const canvas = await html2canvas(target, {
      backgroundColor: '#04000e',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: Math.max(document.documentElement.scrollWidth, 900)
    });
    const link = document.createElement('a');
    link.download = '恋爱镜像测试结果.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('图片生成失败，请截图保存。');
    console.error(e);
  }
  overlay.classList.remove('active');
}
